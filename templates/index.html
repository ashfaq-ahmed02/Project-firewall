<!DOCTYPE html>
<html>
<head>
    <title>Firewall Dashboard</title>
</head>

<body>

    <h1>Firewall Dashboard</h1>

    <table border="1">

        <tr>
            <th>ID</th>
            <th>IP Address</th>
            <th>Port</th>
            <th>Action</th>
        </tr>

        {% for log in logs %}

        <tr>
            <td>{{ log[0] }}</td>
            <td>{{ log[1] }}</td>
            <td>{{ log[2] }}</td>
            <td>{{ log[3] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
